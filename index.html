<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/mantis_wo_text.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MantisPDF — Free PDF Tools in Your Browser</title>
    <meta name="description" content="Free browser-based PDF tools. Split, merge, compress, rotate — your files never leave your device." />
    <meta name="robots" content="index, follow" />
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "MantisPDF",
      "applicationCategory": "UtilitiesApplication",
      "operatingSystem": "Web",
      "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
      "description": "Free browser-based PDF tools. Split, merge, compress, rotate — files never leave your device.",
      "url": "https://mantispdf.vercel.app"
    }
    </script>
    <script>
      (function () {
        var stored = localStorage.getItem("theme");
        var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        if (stored === "dark" || (!stored && prefersDark)) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
