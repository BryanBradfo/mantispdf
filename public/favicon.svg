<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#16a34a"/>

  <g fill="white" transform="translate(16,16.5)">
    <!-- Head — wider triangle, reads as mantis face -->
    <polygon points="0,-12 -5,-7 5,-7"/>

    <!-- Eyes -->
    <circle cx="-2.8" cy="-9.8" r="1.5" fill="#16a34a"/>
    <circle cx="2.8" cy="-9.8" r="1.5" fill="#16a34a"/>

    <!-- Thorax — narrow connector -->
    <rect x="-1.5" y="-7" width="3" height="5" rx="1"/>

    <!-- Abdomen — elongated teardrop -->
    <ellipse cx="0" cy="4" rx="3" ry="7"/>

    <!-- Raptorial forelegs — elegant V shape -->
    <path d="M-2,-5 L-8,-11" stroke="white" stroke-width="2" stroke-linecap="round" fill="none"/>
    <path d="M-8,-11 L-9.5,-7" stroke="white" stroke-width="2" stroke-linecap="round" fill="none"/>
    <path d="M2,-5 L8,-11" stroke="white" stroke-width="2" stroke-linecap="round" fill="none"/>
    <path d="M8,-11 L9.5,-7" stroke="white" stroke-width="2" stroke-linecap="round" fill="none"/>
  </g>
</svg>
