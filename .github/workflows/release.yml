name: Release

# Build and publish desktop installers for every OS when a version tag is pushed.
#   git tag v1.0.0 && git push origin v1.0.0
on:
  push:
    tags:
      - "v*"

# tauri-action creates a GitHub Release and uploads the installers, so the job
# needs write access to repository contents.
permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Two macOS targets so both Apple Silicon and Intel Macs get a build.
          # pdfium_* fields select the matching libpdfium from bblanchon/pdfium-binaries.
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
            rust_targets: "aarch64-apple-darwin,wasm32-unknown-unknown"
            pdfium_asset: "pdfium-mac-arm64.tgz"
            pdfium_inner: "lib/libpdfium.dylib"
            pdfium_out: "libpdfium.dylib"
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
            rust_targets: "x86_64-apple-darwin,wasm32-unknown-unknown"
            pdfium_asset: "pdfium-mac-x64.tgz"
            pdfium_inner: "lib/libpdfium.dylib"
            pdfium_out: "libpdfium.dylib"
          # 22.04 (not 24.04) for a lower glibc baseline → the AppImage runs on
          # more distros.
          - platform: ubuntu-22.04
            args: ""
            rust_targets: "wasm32-unknown-unknown"
            pdfium_asset: "pdfium-linux-x64.tgz"
            pdfium_inner: "lib/libpdfium.so"
            pdfium_out: "libpdfium.so"
          - platform: windows-latest
            args: ""
            rust_targets: "wasm32-unknown-unknown"
            pdfium_asset: "pdfium-win-x64.tgz"
            pdfium_inner: "bin/pdfium.dll"
            pdfium_out: "pdfium.dll"

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      # Tauri v2 Linux system dependencies (WebKitGTK, GTK, AppIndicator, rsvg).
      # No OpenCV: the Rust math-OCR uses the `image` crate, not cv2. PDFium is
      # bound dynamically at runtime, so it is not a build-time dependency here.
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            curl wget file \
            libxdo-dev \
            libssl-dev

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      # Cache the Rust build (ort + tokenizers + liteparse-pdfium are heavy).
      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            ./src-tauri -> target
            ./crates/mantis-wasm -> target

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: latest

      - name: Install JS dependencies
        run: npm ci

      # MUST run before tauri-action: the Tauri `beforeBuildCommand` is
      # `npm run build`, whose `vite build` imports the WASM package from the
      # gitignored crates/mantis-wasm/pkg/. Without this, the frontend build
      # fails to resolve `mantis-wasm`.
      - name: Build WASM engine
        run: npm run build:wasm

      # Bundle libpdfium so the installer is standalone: pdfium-render dlopens it
      # at runtime, and the app resolves it from the resource dir. Matrix values
      # are passed via env (never interpolated into the shell) to stay safe.
      - name: Bundle PDFium library
        shell: bash
        env:
          PDFIUM_ASSET: ${{ matrix.pdfium_asset }}
          PDFIUM_INNER: ${{ matrix.pdfium_inner }}
          PDFIUM_OUT: ${{ matrix.pdfium_out }}
        run: |
          mkdir -p src-tauri/resources
          url="https://github.com/bblanchon/pdfium-binaries/releases/latest/download/${PDFIUM_ASSET}"
          echo "Downloading $url"
          curl -fL "$url" -o /tmp/pdfium.tgz
          tar -xzf /tmp/pdfium.tgz -C /tmp "${PDFIUM_INNER}"
          cp "/tmp/${PDFIUM_INNER}" "src-tauri/resources/${PDFIUM_OUT}"
          ls -la src-tauri/resources

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # --- Optional code-signing / notarization (see notes). If unset, the
          # build is unsigned and still produces installers. ---
          # macOS:
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Tauri updater signature (only if you enable the updater):
          # TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          # TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "MantisPDF ${{ github.ref_name }}"
          releaseBody: "Download the installer for your platform below. All processing runs locally."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
